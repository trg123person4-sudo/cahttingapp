<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Chat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-card">
            <h1><i class="fab fa-whatsapp"></i> Ultimate Chat</h1>
            <div class="auth-form">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="password" placeholder="Password">
                <button onclick="registerUser()">Sign Up</button>
                <button onclick="loginUser()">Login</button>
                <button onclick="quickStart()">Quick Demo</button>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" style="display: none;">
        <!-- Sidebar -->
        <div class="sidebar">
<div class="top-bar">
                <i class="fas fa-ellipsis-v three-dot-btn" onclick="toggleOptionsMenu()" style="cursor: pointer; font-size: 1.4rem;"></i>
                <i class="fas fa-bell notification-btn" onclick="toggleNotifications()" style="cursor: pointer; position: relative; margin-left: 1rem;">
                    <span class="notification-badge" id="notification-count"></span>
                </i>
                <div class="user-profile" onclick="showProfileMenu()" style="cursor:pointer;">
<img id="user-avatar" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHZpZXdCb3g9IjAgMCA0MCA0MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPGNpcmNsZSBjeD0iMjAiIGN5PSIyMCIgcj0iMjAiIGZpbGw9IiM3NzlBOTEiLz4KPHBhdGggZD0iTTIzLjUgMjFDMjMuNSAyMSAyMy41IDIxIDIzLjUgMjFMMjMuNSAyMSIvPgo8L3N2Zz4K" class="avatar" alt="Profile">
                    <span id="user-display"></span>
                </div>
            </div>


            <!-- Notifications Dropdown -->
            <div id="notifications-dropdown" class="notifications-dropdown" style="display: none;">
                <div class="notification-header">
                    <span>Friend Requests</span>
                    <button onclick="clearNotifications()">Clear All</button>
                </div>
                <div id="notifications-list" class="notifications-list">
                    <!-- Dynamic notifications -->
                </div>
            </div>

            <!-- Options Menu -->
            <div id="options-menu" class="options-menu" style="display: none;">
                <div class="menu-option" onclick="addFriend()">
                    <i class="fas fa-user-plus"></i> Add Friend
                </div>
                <div class="menu-option" onclick="changeUsername()">
                    <i class="fas fa-user-edit"></i> Change Username
                </div>
                <div class="menu-option" onclick="logoutUser()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </div>
            </div>

            <!-- Chats List - Empty initially -->
            <div class="chats-list" id="chats-list">
                <!-- Friends will appear here after adding -->
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="main-chat">
            <div class="chat-header">
                <i class="fas fa-bars" onclick="toggleSidebar()"></i>
                <div class="chat-info">
                    <img src="https://via.placeholder.com/40" class="avatar">
                    <h3 id="chat-title">General</h3>
                    <span class="chat-status online"></span>
                </div>
            </div>
            
            <div class="messages" id="messages">
                <!-- Messages will be loaded here -->
            </div>
            
            <div class="message-input-area">
                <button onclick="toggleEmojiPicker()"><i class="fas fa-smile"></i></button>
                <input type="file" id="media-upload" accept="image/*,video/*" style="display: none" onchange="sendMedia()">
                <button onclick="document.getElementById('media-upload').click()"><i class="fas fa-paperclip"></i></button>
                <input type="text" id="message-input" placeholder="Type a message..." onkeypress="handleKey(event)">
                <button onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>

        <!-- Right Panel (Profile/Info) - Hidden initially -->
        <div class="right-panel" id="right-panel" style="display: none;">
            <div class="panel-header">
                <i class="fas fa-arrow-left" onclick="closePanel()"></i>
                <h3>Chat Info</h3>
            </div>
            <div class="panel-content">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <!-- Firebase + Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
